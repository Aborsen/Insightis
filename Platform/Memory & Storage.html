<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: #0A0E13;
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}

body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(10,152,150,.09) 0%, transparent 70%),
    radial-gradient(ellipse 70% 55% at 85% 0%, rgba(110,60,200,.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 75% 45%, rgba(20,80,200,.05) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 5% 55%, rgba(160,50,220,.045) 0%, transparent 65%),
    radial-gradient(ellipse 65% 55% at 50% 90%, rgba(10,152,150,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 95% 75%, rgba(50,90,240,.04) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 35% 30%, rgba(200,60,180,.03) 0%, transparent 55%);
}

:root {
  --mint:#0A9896; --mint-dk:#077270; --mint-lt:#0EC4C1;
  --mint-vivid:#13D4D1;
  --mint-glow:rgba(10,152,150,.45);
  --fd:'Geist',sans-serif;
  --fb:'Geist',sans-serif;
  --fm:'Geist Mono',monospace;
}

/* ── AMBIENT DATA TEXTURE ── */
.ambient-field {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.ambient-item {
  position: absolute;
  font-family: 'Geist Mono', monospace;
  font-size: 11px; font-weight: 500;
  color: rgba(9,160,157,0.12);
  white-space: nowrap;
  animation: ambientFloat linear infinite;
}
@keyframes ambientFloat {
  0%   { transform: translateY(0px); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-40px); opacity: 0; }
}

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulse  { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
section { position: relative; }

/* ── SHOWCASE TABS ── */
.sc-wrap{display:grid;grid-template-columns:340px 1fr;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 6px rgba(0,0,0,.5),0 32px 100px rgba(0,0,0,.6);height:520px;width:100%;position:relative}
.sc-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(10,152,150,.6),rgba(255,255,255,.1),rgba(10,152,150,.6),transparent);z-index:20;pointer-events:none}
.sc-tabs{display:flex;flex-direction:column;background:rgba(10,14,19,.95);border-right:1px solid rgba(255,255,255,.05)}
.sc-tab{flex:1;padding:0 28px;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;min-height:88px;transition:background .2s;position:relative}
.sc-tab:last-child{border-bottom:none}
.sc-tab::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#0A9896;opacity:0;transition:opacity .25s;border-radius:0 2px 2px 0}
.sc-tab.active::before{opacity:1}
.sc-tab.active{background:rgba(7,128,126,.1)}
.sc-tab:hover:not(.active){background:rgba(255,255,255,.025)}
.sc-tab-label{font-size:14px;font-weight:600;color:rgba(255,255,255,.35);transition:color .2s;letter-spacing:-.02em}
.sc-tab.active .sc-tab-label{color:#fff}
.sc-tab-desc{font-size:11.5px;color:rgba(255,255,255,.4);margin-top:5px;line-height:1.5;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease,opacity .35s ease}
.sc-tab.active .sc-tab-desc{max-height:48px;opacity:1;color:rgba(255,255,255,.5)}
.sc-panel-wrap{position:relative;background:radial-gradient(ellipse 100% 80% at 30% 30%,rgba(10,152,150,.06) 0%,transparent 60%),rgba(10,14,19,.97);display:flex;align-items:stretch;justify-content:stretch;padding:20px;overflow:hidden;border-left:1px solid rgba(255,255,255,.04);height:520px}

@media(max-width:768px){
  .sc-wrap{grid-template-columns:1fr;height:auto}
  .sc-tabs{flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid rgba(255,255,255,.05)}
  .sc-tab{min-height:auto;padding:12px 20px;min-width:140px;border-bottom:none;border-right:1px solid rgba(255,255,255,.04)}
  .sc-tab::before{left:0;right:0;top:auto;bottom:0;width:auto;height:3px;border-radius:2px 2px 0 0}
  .sc-tab-desc{display:none}
  .sc-panel-wrap{height:420px}
}

        this.mx=CX()+(Math.random()-.5)*W()*.5;this.my=CY()+(Math.random()-.5)*H()*.22;
        const a=(this.i/this.total)*Math.PI*2,r=H()*.22+Math.random()*H()*.1;
        this.ex=CX()+Math.cos(a)*r*(.3+Math.random()*.45);this.ey=CY()+Math.sin(a)*r*.3;
        this.size=.7+Math.random()*1.6;this.bright=Math.random()<.1;this.delay=Math.random()*.4;
      }
      pos(t){
        const d=Math.max(0,t-this.delay);
        if(d<.7){const p=d/.7,e=p*p;return{x:this.sx+(this.mx-this.sx)*e*.5,y:this.sy+(this.my-this.sy)*e*.5,a:Math.min(1,p*2)*(this.bright?.85:.28)};}
        if(d<1.35){const p=(d-.7)/.65,e=1-Math.pow(1-p,3),x0=this.sx+(this.mx-this.sx)*.5,y0=this.sy+(this.my-this.sy)*.5;return{x:x0+(this.mx-x0)*e,y:y0+(this.my-y0)*e,a:this.bright?.95:.5};}
        if(d<1.95){const p=(d-1.35)/.6,e=1-Math.pow(1-p,2.5);return{x:this.mx+(this.ex-this.mx)*e,y:this.my+(this.ey-this.my)*e,a:(1-e*.5)*.7};}
        if(d<2.7){const p=(d-1.95)/.75,e=p*p;return{x:this.ex+(this.ex>CX()?200:-200)*e,y:this.ey,a:(1-e)*.45};}
        return null;
      }
    }
    const particles=Array.from({length:100},(_,i)=>new Particle(i,100));

    // drawChaos — fragments drift, pull to center, fade
    function drawChaos(t){
      if(t<0.3)return;
      const settle=t>5.8?clamp((t-5.8)/0.7,0,1):0;
      chaosItems.forEach((m)=>{
        const appear=clamp((t-0.3-m.delay)/0.5,0,1);
        const pull=t>2.0?clamp((t-2.0)/1.0,0,1):0;
        const pullE=easeIn3(pull);
        const fade=t>2.8?clamp((t-2.8)/0.5,0,1):0;
        const a=appear*(1-fade)*(1-settle); if(a<0.01)return;
        const drift=Math.sin(t*0.9+m.phase)*8;
        const dim=Math.min(W(),H());
        let bx=CX()+m.nx*dim+m.driftX*drift*dim;
        let by=CY()+m.ny*dim+m.driftY*drift*dim;
        bx=bx+(CX()-bx)*pullE; by=by+(CY()-by)*pullE;
        ctx.save(); ctx.globalAlpha=a; ctx.translate(bx,by);
        const fs=m.size==='lg'?Math.min(16,W()*.015):Math.min(12,W()*.011);
        ctx.font=`500 ${fs}px 'Geist Mono',monospace`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const isData=m.text.includes('???')||m.text.includes('varies')||m.text.includes('unknown');
        if(isData){ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},.38)`;}
        else{ctx.shadowColor=`rgba(${T[0]},${T[1]},${T[2]},.3)`;ctx.shadowBlur=6;ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},.55)`;}
        ctx.fillText(m.text,0,0); ctx.shadowBlur=0; ctx.restore();
      });
    }

    // drawGlow — radial flash at convergence (t=3.0), green-tinted
    function drawGlow(t){
      const settle=t>5.8?clamp((t-5.8)/0.7,0,1):0;
      const peak=Math.max(0,1-Math.abs(t-3.0)/.8)*.25*(1-settle);if(peak<.005)return;
      const r=H()*.35;
      const g=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),r);
      g.addColorStop(0,`rgba(${G[0]},${G[1]},${G[2]},${peak})`);
      g.addColorStop(0.4,`rgba(${T[0]},${T[1]},${T[2]},${peak*.4})`);
      g.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.fillStyle=g;ctx.fillRect(0,0,W(),H());
    }

    // drawDWH — green glowing DWH block scales in at center
    function drawDWH(t){
      if(t<3.0)return;
      const appear=clamp((t-3.0)/0.7,0,1);
      const settle=t>5.8?clamp((t-5.8)/0.7,0,1):0;
      const a=easeOut5(appear)*(1-settle); if(a<0.01)return;
      const cx=CX(),cy=CY();
      const sc=0.6+0.4*easeOut5(appear);
      const bw=140*sc, bh=55*sc, br=8;
      const bx=cx-bw/2, by=cy-bh/2;
      // Glow haze
      const haze=ctx.createRadialGradient(cx,cy,0,cx,cy,bw*1.6);
      haze.addColorStop(0,`rgba(${G[0]},${G[1]},${G[2]},${a*.2})`);
      haze.addColorStop(1,`rgba(${G[0]},${G[1]},${G[2]},0)`);
      ctx.fillStyle=haze;ctx.fillRect(0,0,W(),H());
      // Block body
      ctx.save();ctx.globalAlpha=a;
      ctx.beginPath();
      ctx.moveTo(bx+br,by);ctx.lineTo(bx+bw-br,by);ctx.arcTo(bx+bw,by,bx+bw,by+br,br);
      ctx.lineTo(bx+bw,by+bh-br);ctx.arcTo(bx+bw,by+bh,bx+bw-br,by+bh,br);
      ctx.lineTo(bx+br,by+bh);ctx.arcTo(bx,by+bh,bx,by+bh-br,br);
      ctx.lineTo(bx,by+br);ctx.arcTo(bx,by,bx+br,by,br);ctx.closePath();
      const bg=ctx.createLinearGradient(bx,by,bx,by+bh);
      bg.addColorStop(0,`rgba(${G[0]},${G[1]},${G[2]},.2)`);bg.addColorStop(1,`rgba(${G[0]},${G[1]},${G[2]},.07)`);
      ctx.fillStyle=bg;ctx.fill();
      ctx.shadowColor=`rgba(${G[0]},${G[1]},${G[2]},.7)`;ctx.shadowBlur=20;
      ctx.strokeStyle=`rgba(${G[0]},${G[1]},${G[2]},${a*.7})`;ctx.lineWidth=1.2;ctx.stroke();
      ctx.shadowBlur=0;
      // Label
      ctx.font=`700 ${Math.min(11,W()*.01)}px 'Geist Mono',monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=`rgba(${G[0]},${G[1]},${G[2]},${a})`;
      ctx.shadowColor=`rgba(${G[0]},${G[1]},${G[2]},.6)`;ctx.shadowBlur=10;
      ctx.fillText('Insightis DWH',cx,cy);ctx.shadowBlur=0;
      ctx.restore();
    }

    // drawUpload — typewriter upload text below DWH
    function drawUpload(t){
      if(t<3.2)return;
      const settle=t>5.8?clamp((t-5.8)/0.7,0,1):0;
      const a=(1-settle); if(a<0.01)return;
      const TEXT='sales_q3.csv uploaded \u2014 12,847 rows indexed';
      const p=clamp((t-3.2)/1.0,0,1);
      const chars=Math.floor(p*TEXT.length);
      const cursor=p<1&&Math.sin(t*7)>0?'|':'';
      ctx.save();ctx.globalAlpha=a*0.72;
      ctx.font=`400 ${Math.min(13,W()*.012)}px 'Geist Mono',monospace`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},1)`;
      ctx.shadowColor=`rgba(${T2[0]},${T2[1]},${T2[2]},.4)`;ctx.shadowBlur=6;
      ctx.fillText(TEXT.slice(0,chars)+cursor,CX(),CY()+48);
      ctx.shadowBlur=0;ctx.restore();
    }

    // drawBlueprint — result card slides up with typewriter response
    function drawBlueprint(t){
      if(t<3.9)return;
      const appear=clamp((t-3.9)/0.6,0,1);
      const settle=t>5.8?clamp((t-5.8)/0.7,0,1):0;
      const a=easeOut5(appear)*(1-settle); if(a<0.01)return;
      const cx=CX(),cy=CY();
      const bw=320, bh=68, br=10;
      const byTarget=cy+82;
      const by=byTarget+(1-easeOut5(appear))*14;
      const bx=cx-bw/2;
      ctx.save();ctx.globalAlpha=a;
      // Bubble glow
      const glow=ctx.createRadialGradient(cx,by+bh/2,0,cx,by+bh/2,bw*.7);
      glow.addColorStop(0,`rgba(${G[0]},${G[1]},${G[2]},${a*.06})`);
      glow.addColorStop(1,`rgba(${G[0]},${G[1]},${G[2]},0)`);
      ctx.fillStyle=glow;ctx.fillRect(0,0,W(),H());
      // Bubble body
      ctx.beginPath();
      ctx.moveTo(bx+br,by);ctx.lineTo(bx+bw-br,by);ctx.arcTo(bx+bw,by,bx+bw,by+br,br);
      ctx.lineTo(bx+bw,by+bh-br);ctx.arcTo(bx+bw,by+bh,bx+bw-br,by+bh,br);
      ctx.lineTo(bx+br,by+bh);ctx.arcTo(bx,by+bh,bx,by+bh-br,br);
      ctx.lineTo(bx,by+br);ctx.arcTo(bx,by,bx+br,by,br);ctx.closePath();
      ctx.fillStyle=`rgba(10,14,19,.85)`;ctx.fill();
      ctx.strokeStyle=`rgba(${G[0]},${G[1]},${G[2]},${a*.25})`;ctx.lineWidth=1;ctx.stroke();
      // Typewriter lines
      const lines=['Blueprint updated: 6 entities mapped','Context confidence: 94%'];
      lines.forEach((line,i)=>{
        const lStart=3.9+i*0.35;
        if(t<lStart)return;
        const lp=clamp((t-lStart)/0.8,0,1);
        const chars=Math.floor(lp*line.length);
        const cur=lp<1&&Math.sin(t*7)>0?'|':'';
        const ly=by+24+i*20;
        ctx.font=`500 ${Math.min(12,W()*.011)}px 'Geist Mono',monospace`;
        ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillStyle=i===0?`rgba(${G[0]},${G[1]},${G[2]},.9)`:`rgba(${G[0]},${G[1]},${G[2]},.65)`;
        ctx.fillText(line.slice(0,chars)+cur,bx+16,ly);
      });
      // Insightis AI label
      const labelA=clamp((t-4.3)/0.4,0,1);
      if(labelA>0.01){
        ctx.globalAlpha=a*labelA*0.6;
        ctx.font=`500 ${Math.min(9,W()*.008)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},.7)`;
        ctx.textAlign='left';
        ctx.fillText('Insightis AI',bx+16,by+10);
      }
      ctx.restore();
    }

    // Main animation loop
    function loop(ts){
      if(!startTs)startTs=ts;
      const t=(ts-startTs)/1000;
      ctx.clearRect(0,0,W(),H());
      drawGlow(t);
      particles.forEach(p=>{
        const pos=p.pos(t);if(!pos)return;
        ctx.beginPath();ctx.arc(pos.x,pos.y,p.size,0,Math.PI*2);
        const c=p.bright?T2:T;
        ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${pos.a})`;ctx.fill();
      });
      drawChaos(t);
      drawDWH(t);
      drawUpload(t);
      drawBlueprint(t);
      raf=requestAnimationFrame(loop);
    }
    raf=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={cvRef} style={{position:'absolute',inset:0,zIndex:0}}/>;
}

function LearningPanel() {
  const points = [
    {week:'W1',acc:72},{week:'W2',acc:78},{week:'W3',acc:84},{week:'W4',acc:89},{week:'W5',acc:94},{week:'W6',acc:97},
  ];
  const w=400,h=180,px=50,py=20;
  const maxAcc=100,minAcc=60;
  const xScale=(i)=>px+i*(w-2*px)/(points.length-1);
  const yScale=(v)=>py+(1-(v-minAcc)/(maxAcc-minAcc))*(h-2*py);
  const polyline=points.map((p,i)=>`${xScale(i)},${yScale(p.acc)}`).join(' ');
  const area=`${xScale(0)},${h-py} ${polyline} ${xScale(points.length-1)},${h-py}`;

  return (
    <div style={{width:'100%',alignSelf:'stretch',display:'flex',flexDirection:'column',animation:'slideUp .25s ease both'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 20px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div>
          <div style={{fontSize:'13px',fontWeight:600,color:'#E8F2F5',marginBottom:'2px'}}>Answer Accuracy Over Time</div>
          <div style={{fontSize:'11px',color:'rgba(255,255,255,.4)'}}>AI confidence improves with every conversation</div>
        </div>
        <span style={{fontSize:'10.5px',fontFamily:'Geist Mono,monospace',color:'#0EC4C1',background:'rgba(9,160,157,.1)',border:'1px solid rgba(9,160,157,.2)',borderRadius:'6px',padding:'3px 8px'}}>+25% in 6 weeks</span>
      </div>
      {/* Chart */}
      <div style={{flex:1,padding:'16px 20px 8px',minHeight:0}}>
        <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:'100%',display:'block'}}>
          <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="rgba(9,160,157,0.3)"/>
              <stop offset="100%" stopColor="rgba(9,160,157,0)"/>
            </linearGradient>
          </defs>
          {[60,70,80,90,100].map(v=>(
            <g key={v}>
              <line x1={px} y1={yScale(v)} x2={w-px} y2={yScale(v)} stroke="rgba(255,255,255,0.06)" strokeWidth="0.5"/>
              <text x={px-8} y={yScale(v)+3} fill="rgba(255,255,255,0.3)" fontSize="9" textAnchor="end" fontFamily="Geist Mono,monospace">{v}%</text>
            </g>
          ))}
          <polygon points={area} fill="url(#areaGrad)"/>
          <polyline points={polyline} fill="none" stroke="#0EC4C1" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {points.map((p,i)=>(
            <g key={i}>
              <circle cx={xScale(i)} cy={yScale(p.acc)} r="4" fill="#0A0E13" stroke="#0EC4C1" strokeWidth="2"/>
              <text x={xScale(i)} y={h-py+14} fill="rgba(255,255,255,0.4)" fontSize="9" textAnchor="middle" fontFamily="Geist Mono,monospace">{p.week}</text>
            </g>
          ))}
        </svg>
      </div>
      {/* Milestones */}
      <div style={{display:'flex',justifyContent:'space-between',padding:'10px 20px',borderTop:'1px solid rgba(255,255,255,.05)',flexShrink:0}}>
        {[{label:'First upload',desc:'Basic answers'},{label:'50 questions',desc:'Understands context'},{label:'Regular use',desc:'Anticipates needs'}].map((m,i)=>(
          <div key={i} style={{textAlign:'center',flex:1}}>
            <div style={{fontSize:'11px',fontWeight:600,color:'#0EC4C1',fontFamily:'Geist Mono,monospace',marginBottom:'2px'}}>{m.label}</div>
            <div style={{fontSize:'10px',color:'rgba(255,255,255,.4)'}}>{m.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
