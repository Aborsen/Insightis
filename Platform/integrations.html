function HeroCanvas() {
  const cvRef = useRef(null);
  useEffect(() => {
    const cv = cvRef.current;
    const ctx = cv.getContext('2d');
    let raf, startTime=null;
    const T=[9,160,157], T2=[14,196,193], T3=[200,255,254];
    function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const CX=()=>cv.width/2, CY=()=>cv.height*.46;
    const easeOut3=t=>1-Math.pow(1-t,3), easeOut5=t=>1-Math.pow(1-t,5);
    const easeIn3=t=>t*t*t;
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

    const SOURCES=[
      {name:'Stripe',nx:-0.36,ny:-0.26},{name:'HubSpot',nx:0.32,ny:-0.28},

      {name:'Shopify',nx:0.08,ny:0.28},{name:'Klaviyo',nx:-0.10,ny:0.18},
    ];
    const N=SOURCES.length;

    function bezier(sx,sy,cpx,cpy,ex,ey,t){const mt=1-t;return{x:mt*mt*sx+2*mt*t*cpx+t*t*ex,y:mt*mt*sy+2*mt*t*cpy+t*t*ey};}

    class Particle{
      constructor(i,total){this.i=i;this.total=total;this.init();}
      init(){
        const W=cv.width,H=cv.height,cx=CX(),cy=CY();
        const side=Math.floor(Math.random()*4);
        if(side===0){this.sx=Math.random()*W;this.sy=-20;}
        else if(side===1){this.sx=W+20;this.sy=Math.random()*H;}
        else if(side===2){this.sx=Math.random()*W;this.sy=H+20;}
        else{this.sx=-20;this.sy=Math.random()*H;}
        this.mx=cx+(Math.random()-.5)*W*.45;this.my=cy+(Math.random()-.5)*H*.18;
        const angle=(this.i/this.total)*Math.PI*2,r=H*.22+Math.random()*H*.1;
        this.ex=cx+Math.cos(angle)*r*(.3+Math.random()*.45);this.ey=cy+Math.sin(angle)*r*.3;

        const t2=t-3.3;if(t2<0)return null;
        const d=Math.max(0,t2-this.delay);
        if(d<.7){const p=d/.7,e=p*p;return{x:this.sx+(this.mx-this.sx)*e*.5,y:this.sy+(this.my-this.sy)*e*.5,a:Math.min(1,p*2)*(this.bright?.85:.28)};}
        if(d<1.35){const p=(d-.7)/.65,e=1-Math.pow(1-p,3),x0=this.sx+(this.mx-this.sx)*.5,y0=this.sy+(this.my-this.sy)*.5;return{x:x0+(this.mx-x0)*e,y:y0+(this.my-y0)*e,a:this.bright?.9:.45};}
        if(d<1.95){const p=(d-1.35)/.6,e=1-Math.pow(1-p,2.5);return{x:this.mx+(this.ex-this.mx)*e,y:this.my+(this.ey-this.my)*e,a:(1-e*.5)*.65};}
        if(d<2.7){const p=(d-1.95)/.75,e=p*p;return{x:this.ex+(this.ex>CX()?200:-200)*e,y:this.ey,a:(1-e)*.45};}
        return null;
      }
    }
    const particles=Array.from({length:100},(_,i)=>new Particle(i,100));

    function drawSources(t){
      if(t<0.4)return;
      SOURCES.forEach((s,i)=>{
        const dim=Math.min(cv.width,cv.height);
        let x=CX()+s.nx*dim,y=CY()+s.ny*dim;
        const appear=clamp((t-0.4-i*0.09)/0.5,0,1);
        const pull=t>2.0?clamp((t-2.0)/1.1,0,1):0;
        const pullE=easeIn3(pull);
        x=x+(CX()-x)*pullE;y=y+(CY()-y)*pullE;
        const merge=t>2.6?clamp((t-2.6)/0.5,0,1):0;
        const netFade=t>3.8?clamp((t-3.8)/0.5,0,1):0;
        const a=appear*(1-merge)*(1-netFade);if(a<0.01)return;
        const breath=pull<0.05?Math.sin(t*1.4+i*0.7)*0.06:0;
        ctx.save();ctx.globalAlpha=a;ctx.translate(x,y);ctx.scale(1+breath,1+breath);
        const glowR=ctx.createRadialGradient(0,0,0,0,0,38+pullE*18);
        glowR.addColorStop(0,`rgba(${T[0]},${T[1]},${T[2]},${0.06+pullE*0.12})`);
        glowR.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
        ctx.fillStyle=glowR;ctx.beginPath();ctx.arc(0,0,38+pullE*18,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(0,0,2.5+pullE*2,0,Math.PI*2);
        ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${0.55+pullE*0.4})`;
        if(pullE>0.2){ctx.shadowColor=`rgba(${T2[0]},${T2[1]},${T2[2]},.7)`;ctx.shadowBlur=8+pullE*10;}
        ctx.fill();ctx.shadowBlur=0;
        ctx.font=`500 ${Math.min(18,cv.width*.017)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},${0.6+pullE*0.25})`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(s.name,0,-20);
        ctx.restore();
      });
    }

    function drawTrails(t){
      if(t<2.0||t>3.4)return;
      const globalFade=t>2.9?clamp((t-2.9)/0.4,0,1):0;
      SOURCES.forEach((s,i)=>{
        const startT=2.0+i*0.04;if(t<startT)return;
        const dim=Math.min(cv.width,cv.height);
        const pull=clamp((t-startT)/1.1,0,1),e=easeIn3(pull);
        const sx=CX()+s.nx*dim,sy=CY()+s.ny*dim;
        const cx_=sx+(CX()-sx)*e,cy_=sy+(CY()-sy)*e;
        const trailA=pull*0.28*(1-globalFade);if(trailA<0.005)return;
        const grad=ctx.createLinearGradient(sx,sy,cx_,cy_);
        grad.addColorStop(0,`rgba(${T[0]},${T[1]},${T[2]},0)`);
        grad.addColorStop(0.5,`rgba(${T[0]},${T[1]},${T[2]},${trailA*0.4})`);
        grad.addColorStop(1,`rgba(${T2[0]},${T2[1]},${T2[2]},${trailA})`);
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(cx_,cy_);
        ctx.strokeStyle=grad;ctx.lineWidth=1;ctx.stroke();
      });
    }

    function drawFlash(t){
      const peak=Math.max(0,1-Math.abs(t-3.1)/.7)*.42;if(peak<.005)return;
      const g=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),80+peak*120);
      g.addColorStop(0,`rgba(${T2[0]},${T2[1]},${T2[2]},${peak})`);
      g.addColorStop(0.4,`rgba(${T[0]},${T[1]},${T[2]},${peak*.4})`);
      g.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);
    }

    function drawNetwork(t){
      if(t<3.5)return;
      const fi=clamp((t-3.5)/0.8,0,1);
      const fo=t>6.5?clamp((t-6.5)/0.7,0,1):0;
      const a=easeOut5(fi)*(1-fo);if(a<0.01)return;
      const cx=CX(),cy=CY(),pulse=1+Math.sin(t*3.2)*0.04;
      const ringR=Math.min(cv.width,cv.height)*0.32;
      const orbR=Math.min(cv.width,cv.height)*0.055*pulse;

      // Outer haze
      const ag=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR*3.5);
      ag.addColorStop(0,`rgba(${T[0]},${T[1]},${T[2]},${a*.1})`);
      ag.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.fillStyle=ag;ctx.fillRect(0,0,cv.width,cv.height);
      // Mid glow
      const mg=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR*1.8);
      mg.addColorStop(0,`rgba(${T2[0]},${T2[1]},${T2[2]},${a*.22})`);
      mg.addColorStop(0.6,`rgba(${T[0]},${T[1]},${T[2]},${a*.1})`);
      mg.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.beginPath();ctx.arc(cx,cy,orbR*1.8,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();
      // Core
      const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR);
      ig.addColorStop(0,`rgba(255,255,255,${a*.28})`);
      ig.addColorStop(0.35,`rgba(${T3[0]},${T3[1]},${T3[2]},${a*.32})`);
      ig.addColorStop(0.7,`rgba(${T2[0]},${T2[1]},${T2[2]},${a*.15})`);
      ig.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.beginPath();ctx.arc(cx,cy,orbR,0,Math.PI*2);ctx.fillStyle=ig;ctx.fill();

      // Ring
      ctx.beginPath();ctx.arc(cx,cy,ringR,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${T[0]},${T[1]},${T[2]},${a*easeOut3(fi)*0.12})`;
      ctx.lineWidth=0.7;ctx.stroke();

      SOURCES.forEach((s,i)=>{
        const delay=i/N*0.65;
        const na=clamp((fi-delay)/0.45,0,1);if(na<0.01)return;
        const nodeA=a*easeOut3(na);
        const angle=(i/N)*Math.PI*2-Math.PI/2;
        const sx=cx+Math.cos(angle)*ringR,sy=cy+Math.sin(angle)*ringR;
        const perp=i%2===0?1:-1,mag=ringR*(0.35+0.15*(i%3));
        const midX=(sx+cx)/2,midY=(sy+cy)/2;
        const dx=cx-sx,dy=cy-sy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const cpx=midX+(-dy/len)*mag*perp,cpy=midY+(dx/len)*mag*perp;
        const dx0=cx-sx,dy0=cy-sy,dist=Math.sqrt(dx0*dx0+dy0*dy0)||1;
        const stopFrac=Math.max(0,1-(orbR*1.1)/dist);
        const ep=bezier(sx,sy,cpx,cpy,cx,cy,stopFrac);
        // Bezier line
        const lineA=nodeA*0.3;
        const grad=ctx.createLinearGradient(sx,sy,ep.x,ep.y);
        grad.addColorStop(0,`rgba(${T2[0]},${T2[1]},${T2[2]},${lineA*0.5})`);
        grad.addColorStop(0.7,`rgba(${T[0]},${T[1]},${T[2]},${lineA})`);
        grad.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.quadraticCurveTo(cpx,cpy,ep.x,ep.y);
        ctx.strokeStyle=grad;ctx.lineWidth=1.2;ctx.stroke();
        // Impulse
        const imp=(t*0.15+i/N)%1,impStop=imp*stopFrac;
        const impPt=bezier(sx,sy,cpx,cpy,cx,cy,impStop);
        const impA=Math.sin(imp*Math.PI)*nodeA*0.95;
        if(impA>0.02){
          ctx.beginPath();ctx.arc(impPt.x,impPt.y,2.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(${T3[0]},${T3[1]},${T3[2]},${impA})`;
          ctx.shadowColor=`rgba(${T2[0]},${T2[1]},${T2[2]},.9)`;ctx.shadowBlur=10;
          ctx.fill();ctx.shadowBlur=0;
        }
        // Node dot
        ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);
        ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${nodeA*0.9})`;
        ctx.shadowColor=`rgba(${T2[0]},${T2[1]},${T2[2]},.7)`;ctx.shadowBlur=10;
        ctx.fill();ctx.shadowBlur=0;
        // Label
        const labelR=ringR+38;
        const lx=cx+Math.cos(angle)*labelR,ly=cy+Math.sin(angle)*labelR;
        ctx.save();ctx.globalAlpha=nodeA*0.82;
        ctx.font=`500 ${Math.min(13,cv.width*.012)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},1)`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(s.name,lx,ly);
        ctx.restore();
      });
    }

    function loop(ts){
      if(!startTime)startTime=ts;
      const t=(ts-startTime)/1000;
      ctx.clearRect(0,0,cv.width,cv.height);
      drawFlash(t);
      const particleFade=t>3.8?Math.max(0,1-(t-3.8)/0.4):1;
      if(particleFade>0.01){
        particles.forEach(p=>{
          const pos=p.pos(t);if(!pos)return;
          ctx.beginPath();ctx.arc(pos.x,pos.y,p.size,0,Math.PI*2);
          const c=p.bright?T2:T;
          ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${pos.a*particleFade})`;ctx.fill();
        });
      }
      drawTrails(t);drawSources(t);drawNetwork(t);
      raf=requestAnimationFrame(loop);
    }
    raf=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={cvRef} style={{position:'absolute',inset:0,zIndex:0}}/>;
}

/* ── INTEGRATION IMPACT ── */
function IntegrationImpact() {
  const STATS = [
    { pre:'',   target:12, suf:'×',    label:'faster time to insight',             sub:'vs. manual exports & BI tools' },
    { pre:'',   target:8,  suf:' hrs', label:'saved per analyst per week',         sub:'no more copy-paste dashboards' },
    { pre:'',   target:90, suf:'%',    label:'fewer data requests to engineering',  sub:'teams self-serve in plain English' },
    { pre:'< ', target:5,  suf:' min', label:'to connect a new source',             sub:'OAuth, no pipelines to maintain' },
  ];

  const [counts, setCounts] = useState([0, 0, 0, 0]);
  const [inView, setInView]   = useState(false);
  const sectionRef = useRef(null);

  // Fire when section scrolls into viewport
  useEffect(() => {
    const el = sectionRef.current;
    if (!el || typeof IntersectionObserver === 'undefined') return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setInView(true); obs.disconnect(); } },
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  // Start count-up animations once in view
  useEffect(() => {
    if (!inView) return;
    const rafs = [];
    const tids = [];
    STATS.forEach((s, i) => {
      const tid = setTimeout(() => {
        const duration = 8400;
        let startTs = null;
        const step = (ts) => {
          if (!startTs) startTs = ts;
          const p = Math.min((ts - startTs) / duration, 1);
          const eased = p < 0.85 ? p / 0.85 : 1;
          const val = p < 1 ? Math.min(Math.round(eased * s.target), s.target) : s.target;
          setCounts(prev => { const n = [...prev]; n[i] = val; return n; });
          if (p < 1) { rafs[i] = requestAnimationFrame(step); }
        };
        rafs[i] = requestAnimationFrame(step);
      }, 0);
      tids.push(tid);
    });
    return () => {
      tids.forEach(clearTimeout);
      rafs.forEach(r => r && cancelAnimationFrame(r));
    };
  }, [inView]);


  return (
    <section ref={sectionRef} style={{padding:'80px 0 100px', background:'linear-gradient(180deg,#101620 0%,#0A0E13 100%)'}}>
      <div style={{maxWidth:'80rem',margin:'0 auto',padding:'0 1.5rem'}}>

        {/* Heading */}
        <div style={{textAlign:'center',marginBottom:'52px'}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 12px',background:'rgba(9,160,157,.08)',border:'1px solid rgba(9,160,157,.2)',borderRadius:'999px',marginBottom:'14px'}}>
            <span style={{color:'#09A09D',fontSize:'12px'}}>✦</span>
            <span style={{fontSize:'10px',fontWeight:600,letterSpacing:'.12em',textTransform:'uppercase',color:'#09A09D',fontFamily:'Geist Mono,monospace'}}>Why direct integration matters</span>
          </div>
          <h2 style={{fontSize:'clamp(2.25rem,4vw,3rem)',fontWeight:500,color:'#fff',letterSpacing:'-.03em',marginBottom:'16px'}}>
            The cost of disconnected data — and what changes
          </h2>
          <p style={{fontSize:'clamp(1rem,1.8vw,1.125rem)',color:'rgba(255,255,255,0.8)',maxWidth:'42rem',margin:'0 auto',lineHeight:1.65}}>
            Every hour spent on exports and copy-pasting is an hour lost to decisions. Direct integration eliminates the manual pipeline — giving your team real-time, trusted numbers across every source.
          </p>
        </div>

        {/* Stats row */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'40px'}}>
          {STATS.map((s, i) => (
            <div key={i} style={{
              background:'rgba(13,17,23,.7)',
              border:'1px solid rgba(255,255,255,.06)',
              borderRadius:'16px',
              padding:'28px 24px',
              position:'relative',
              overflow:'hidden',
              opacity: inView ? 1 : 0,
              transform: inView ? 'translateY(0)' : 'translateY(22px)',
              transition: `opacity .6s ease ${i * 0.1}s, transform .6s ease ${i * 0.1}s`,
            }}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:'1px',background:'linear-gradient(90deg,transparent,rgba(9,160,157,.4),transparent)'}}/>
              <div style={{fontSize:'clamp(28px,3vw,40px)',fontWeight:700,color:'#0EC4C1',fontFamily:'Geist Mono,monospace',letterSpacing:'-.04em',lineHeight:1,marginBottom:'10px'}}>
                {s.pre}{counts[i]}{s.suf}
              </div>
              <div style={{fontSize:'0.875rem',fontWeight:500,color:'#fff',marginBottom:'6px',lineHeight:1.3}}>{s.label}</div>
              <div style={{fontSize:'12px',color:'#8A9BA4',lineHeight:1.5}}>{s.sub}</div>
            </div>
          ))}
        </div>


      </div>
    </section>
  );
}
