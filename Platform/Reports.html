tailwind.config = {
  theme: {
    extend: {
      colors: {
        base: '#0A0E13',

        'text-secondary': '#7FA0AC',
        'text-muted': '#7FA0AC',
        success: '#22C55E',
        danger: '#F87171',

        sans: ['Geist', 'sans-serif'],
        mono: ['Geist Mono', 'monospace'],

}

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Geist', sans-serif; background: #0A0E13; color: #E8F2F5; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
:root {
  --mint:#0A9896; --mint-dk:#077270; --mint-lt:#0EC4C1; --mint-vivid:#13D4D1;
  --mint-glow:rgba(10,152,150,.45);
  --green:#22C55E; --red:#F87171;
  --bg:#0A0E13; --bg-1:#0D1117; --bg-2:#101620; --bg-3:#141D26;
  --surface:rgba(255,255,255,.038); --surface-2:rgba(255,255,255,.065); --surface-3:rgba(255,255,255,.10);
  --b1:rgba(255,255,255,.055); --b2:rgba(255,255,255,.095); --b3:rgba(10,152,150,.38);
  --t1:#E8F2F5; --t2:#7FA0AC; --t3:#7FA0AC; --t4:#253840;
  --ease:cubic-bezier(.4,0,.2,1);
  --fb:'Geist',sans-serif;
  --fm:'Geist Mono',monospace;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulse { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

section { position: relative; }

.connector-card { display:flex; align-items:center; gap:12px; padding:14px 16px; background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.06); border-radius:12px; transition:all .18s ease; cursor:default; }
.connector-card:hover { background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.12); transform:translateY(-1px); }

body::before {
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.4;mix-blend-mode:overlay
}

body::after {
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(10,152,150,.09) 0%, transparent 70%),
    radial-gradient(ellipse 70% 55% at 85% 0%, rgba(110,60,200,.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 75% 45%, rgba(20,80,200,.05) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 5% 55%, rgba(160,50,220,.045) 0%, transparent 65%),
    radial-gradient(ellipse 65% 55% at 50% 90%, rgba(10,152,150,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 95% 75%, rgba(50,90,240,.04) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 35% 30%, rgba(200,60,180,.03) 0%, transparent 55%);
}

.sc-wrap { display:grid; grid-template-columns:320px 1fr; height:560px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.08); background:rgba(10,14,19,.8); }
.sc-tabs { border-right:1px solid rgba(255,255,255,.07); overflow-y:auto; background:rgba(8,12,18,.6); }
.sc-tabs::-webkit-scrollbar{width:3px}
.sc-tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.sc-tab { padding:14px 18px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.05); transition:all .15s; display:flex; flex-direction:column; gap:4px; }
.sc-tab:hover { background:rgba(255,255,255,.03); }
.sc-tab.active { background:rgba(9,160,157,.08); border-left:2px solid #09A09D; }
.sc-panel { overflow-y:auto; padding:28px; }
.sc-panel::-webkit-scrollbar{width:3px}
.sc-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

.metric-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:10px; padding:14px 16px; }
.rec-box { background:rgba(9,160,157,.07); border:1px solid rgba(9,160,157,.25); border-radius:10px; padding:14px 16px; margin-top:16px; }
.source-pill { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:999px; padding:4px 12px; font-size:11px; color:#7FA0AC; }

@media(max-width:900px){
  .sc-wrap { grid-template-columns:1fr; grid-template-rows:auto 1fr; height:auto; }
  .sc-tabs { display:flex; overflow-x:auto; border-right:none; border-bottom:1px solid rgba(255,255,255,.07); }
  .sc-tab { border-bottom:none; border-right:1px solid rgba(255,255,255,.05); min-width:160px; }
  .sc-tab.active { border-left:none; border-bottom:2px solid #09A09D; }
}
</style>

class BP{constructor(i,n){this.i=i;this.n=n;this.init();}

    this.mx=cx+(Math.random()-.5)*W*.45;this.my=cy+(Math.random()-.5)*H*.18;
    const a=(this.i/this.n)*Math.PI*2,r=H*.22+Math.random()*H*.1;
    this.ex=cx+Math.cos(a)*r*(.3+Math.random()*.45);this.ey=cy+Math.sin(a)*r*.3;

    if(d<1.95){const p=(d-1.35)/.6,e=1-Math.pow(1-p,2.5);return{x:this.mx+(this.ex-this.mx)*e,y:this.my+(this.ey-this.my)*e,a:(1-e*.5)*.7};}
    if(d<2.7){const p=(d-1.95)/.75,e=p*p;return{x:this.ex+(this.ex>CX()?200:-200)*e,y:this.ey,a:(1-e)*.5};}

function drawPP(t){
  const t2=t-2.3;
  if(t2<0||pp.length===0)return;
  pp.forEach(p=>{
    const d=Math.max(0,t2-p.delay*.5);
    if(d<=0)return;
    // Direct path: text pixel → card, with slight arc
    const dur=0.8;
    const e=eO5(Math.min(1,d/dur));
    // Arc: perpendicular offset peaks at midpoint
    const arcT=Math.sin(e*Math.PI);
    const x=p.sx+(p.ex-p.sx)*e + p.arcX*arcT;
    const y=p.sy+(p.ey-p.sy)*e + p.arcY*arcT;
    // Alpha: fade in first 20%, full, fade out last 20%
    const a = e<0.15 ? (e/0.15)*0.8
             : e>0.85 ? ((1-e)/0.15)*0.5
             : 0.75;
    if(a<0.02)return;
    ctx.beginPath();ctx.arc(x,y,p.sz,0,Math.PI*2);
    const[r,g,b]=p.col;ctx.fillStyle=`rgba(${r},${g},${b},${a})`;
    if(p.bright){ctx.shadowColor=`rgba(${r},${g},${b},.8)`;ctx.shadowBlur=7;}
    ctx.fill();ctx.shadowBlur=0;
  });
}

function ReportsShowcase() {

              <div style={{display:'grid',gridTemplateColumns:`repeat(${report.metrics.length},1fr)`,gap:'10px',marginBottom:'18px'}}>

                </div>

          </div>
        </div>
      </div>
    </section>
  );
}
