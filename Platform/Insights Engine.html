<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights Engine — Insightis</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: #0A0E13;
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}

body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(10,152,150,.09) 0%, transparent 70%),
    radial-gradient(ellipse 70% 55% at 85% 0%, rgba(110,60,200,.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 75% 45%, rgba(20,80,200,.05) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 5% 55%, rgba(160,50,220,.045) 0%, transparent 65%),
    radial-gradient(ellipse 65% 55% at 50% 90%, rgba(10,152,150,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 95% 75%, rgba(50,90,240,.04) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 35% 30%, rgba(200,60,180,.03) 0%, transparent 55%);
}

:root {
  --mint:#0A9896; --mint-dk:#077270; --mint-lt:#0EC4C1;
  --mint-vivid:#13D4D1;
  --mint-glow:rgba(10,152,150,.45);
  --fd:'Geist',sans-serif;
  --fb:'Geist',sans-serif;
  --fm:'Geist Mono',monospace;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulse  { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes typing { from{width:0} to{width:100%} }
@keyframes glowPulse {
  0%,100%{box-shadow:0 0 8px rgba(9,160,157,.2), 0 0 20px rgba(9,160,157,.1)}
  50%{box-shadow:0 0 16px rgba(9,160,157,.4), 0 0 40px rgba(9,160,157,.2)}
}

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

.chat-bubble-user {
  background: rgba(9,160,157,0.12);
  border: 1px solid rgba(9,160,157,0.25);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 13.5px;
  color: #E8F2F5;
  align-self: flex-end;
  max-width: 85%;
}
.chat-bubble-ai {
  background: rgba(255,255,255,0.038);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 14px;
  font-size: 13.5px;
  color: #C0D4DC;
  align-self: flex-start;
  max-width: 95%;
  line-height: 1.6;
}
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #0EC4C1;
  animation: pulse 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
section { position: relative; }

/* Showcase panel */
.sc-wrap{display:grid;grid-template-columns:320px 1fr;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 6px rgba(0,0,0,.5),0 32px 100px rgba(0,0,0,.6);height:680px;width:100%;position:relative}
.sc-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(10,152,150,.6),rgba(255,255,255,.1),rgba(10,152,150,.6),transparent);z-index:20;pointer-events:none}
.sc-tabs{display:flex;flex-direction:column;background:rgba(10,14,19,.95);border-right:1px solid rgba(255,255,255,.05)}
.sc-tab{flex:1;padding:0 28px;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;min-height:88px;transition:background .2s;position:relative}
.sc-tab:last-child{border-bottom:none}
.sc-tab::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#0A9896;opacity:0;transition:opacity .25s;border-radius:0 2px 2px 0}
.sc-tab.active::before{opacity:1}
.sc-tab.active{background:rgba(7,128,126,.1)}
.sc-tab:hover:not(.active){background:rgba(255,255,255,.025)}
.sc-tab-label{font-size:14px;font-weight:600;color:rgba(255,255,255,.35);transition:color .2s;letter-spacing:-.02em}
.sc-tab.active .sc-tab-label{color:#fff}
.sc-tab-desc{font-size:11.5px;color:rgba(255,255,255,.4);margin-top:5px;line-height:1.5;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s ease,opacity .35s ease}
.sc-tab.active .sc-tab-desc{max-height:48px;opacity:1;color:rgba(255,255,255,.5)}
.sc-panel-wrap{position:relative;background:radial-gradient(ellipse 100% 80% at 30% 30%,rgba(10,152,150,.06) 0%,transparent 60%),rgba(10,14,19,.97);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;overflow-x:hidden;border-left:1px solid rgba(255,255,255,.04)}

@media(max-width:768px){
  .sc-wrap{grid-template-columns:1fr!important;height:auto!important}
  .sc-tabs{flex-direction:row!important;overflow-x:auto!important;border-right:none!important;border-bottom:1px solid rgba(255,255,255,.05)!important}
  .sc-tab{min-width:160px!important;min-height:60px!important;padding:12px 20px!important;border-bottom:none!important;border-right:1px solid rgba(255,255,255,.04)!important}
  .sc-tab::before{left:0;right:0;top:auto;bottom:0;width:auto;height:3px;border-radius:2px 2px 0 0}
  .sc-panel-wrap{height:auto!important;min-height:520px}
  [data-steps-grid]{grid-template-columns:1fr!important}
  [data-compare-grid]{grid-template-columns:1fr!important}
  [data-caps-grid]{grid-template-columns:1fr!important}
}
</style>
</head>

/* ── CHART COMPONENTS ── */
function HorizontalBarChart({ bars }) {
  const maxVal = Math.max(...bars.map(b => Math.abs(b.value)));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'6px',margin:'8px 0'}}>
      {bars.map((b,i) => (
        <div key={i} style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'11px',color:'#7FA0AC',fontFamily:'Geist Mono,monospace',minWidth:'120px',textAlign:'right',flexShrink:0}}>{b.label}</span>
          <div style={{flex:1,background:'rgba(255,255,255,.04)',borderRadius:'4px',height:'18px',position:'relative',overflow:'hidden'}}>
            <div style={{width:`${(Math.abs(b.value)/maxVal)*100}%`,height:'100%',borderRadius:'4px',background: b.color || (b.value < 0 ? 'rgba(220,80,80,.7)' : 'rgba(9,160,157,.6)')}}/>
          </div>
          <span style={{fontSize:'12px',fontFamily:'Geist Mono,monospace',color: b.value < 0 ? '#E06060' : '#0EC4C1',minWidth:'60px',flexShrink:0}}>{b.display}</span>
        </div>
      ))}
    </div>
  );
}

function PieChart({ slices }) {
  const total = slices.reduce((s, d) => s + Math.abs(d.value), 0);
  const colors = ['#0EC4C1','#09A09D','#F87171','#FBBF24','#818CF8','#34D399'];
  let angle = -Math.PI / 2;
  const cx = 90, cy = 90, r = 75, ri = 38;
  const paths = slices.map((s, i) => {
    const sweep = (Math.abs(s.value) / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(angle + sweep), y2 = cy + r * Math.sin(angle + sweep);
    const xi1 = cx + ri * Math.cos(angle), yi1 = cy + ri * Math.sin(angle);
    const xi2 = cx + ri * Math.cos(angle + sweep), yi2 = cy + ri * Math.sin(angle + sweep);
    const large = sweep > Math.PI ? 1 : 0;
    const d = `M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1} Z`;
    angle += sweep;
    return { d, color: s.color || colors[i % colors.length], label: s.label, pct: Math.round((Math.abs(s.value)/total)*100) };
  });
  return (
    <div style={{display:'flex',alignItems:'center',gap:'24px',margin:'12px 0'}}>
      <svg viewBox="0 0 180 180" style={{width:'160px',height:'160px',flexShrink:0}}>
        {paths.map((p,i) => <path key={i} d={p.d} fill={p.color} opacity=".85"/>)}
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:'10px',flex:1}}>
        {paths.map((p,i) => (
          <div key={i} style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <div style={{width:'10px',height:'10px',borderRadius:'3px',background:p.color,flexShrink:0}}/>
            <span style={{fontSize:'12px',color:'#7FA0AC',fontFamily:'Geist Mono,monospace',flex:1}}>{p.label}</span>
            <span style={{fontSize:'12px',color:'#E8F2F5',fontFamily:'Geist Mono,monospace',fontWeight:500}}>{p.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function TreemapChart({ items }) {
  const colors = ['#0EC4C1','#09A09D','#818CF8','#FBBF24','#F87171','#34D399','#60A5FA'];
  const sorted = [...items].sort((a,b) => b.value - a.value);
  const total = sorted.reduce((s,i) => s + i.value, 0);
  const W = 620, H = 150, gap = 4;
  const leftW = Math.round((sorted[0].value / total) * W);
  const rest = sorted.slice(1);
  const restTotal = rest.reduce((s,i) => s + i.value, 0) || 1;
  const cells = [{ x:0, y:0, w:leftW - gap, h:H, item:sorted[0], color:sorted[0].color || colors[0] }];
  let y = 0;
  rest.forEach((item, i) => {
    const h = Math.round((item.value / restTotal) * H);
    cells.push({ x:leftW, y, w:W - leftW, h:h - gap, item, color:item.color || colors[i+1] });
    y += h;
  });
  return (
    <div style={{margin:'6px 0'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxHeight:'150px'}}>
        {cells.map((c,i) => (
          <g key={i}>
            <rect x={c.x} y={c.y} width={Math.max(0,c.w)} height={Math.max(0,c.h)} fill={c.color} opacity=".78" rx="6"/>
            <text x={c.x+c.w/2} y={c.y+c.h/2-(c.h>50?12:0)} textAnchor="middle" dominantBaseline="middle" style={{fontSize:c.w>180?'11px':'9px',fill:'rgba(255,255,255,.8)',fontFamily:'Geist Mono,monospace'}}>{c.item.label}</text>
            {c.h>50 && <text x={c.x+c.w/2} y={c.y+c.h/2+14} textAnchor="middle" dominantBaseline="middle" style={{fontSize:'16px',fill:'#fff',fontFamily:'Geist Mono,monospace',fontWeight:500}}>{c.item.display}</text>}
          </g>
        ))}
      </svg>
    </div>
  );
}

function LineChart({ points, labels }) {
  const max = Math.max(...points);
  const min = Math.min(...points) * 0.9;
  const range = max - min || 1;
  const w = 420, h = 100, px = 30, py = 8;
  const chartW = w - px*2, chartH = h - py*2;
  const coords = points.map((v,i) => ({
    x: px + (i / (points.length-1)) * chartW,
    y: py + chartH - ((v - min) / range) * chartH,
  }));
  const line = coords.map((c,i) => `${i===0?'M':'L'}${c.x},${c.y}`).join(' ');
  const area = line + ` L${coords[coords.length-1].x},${h-py} L${coords[0].x},${h-py} Z`;
  return (
    <div style={{margin:'6px 0'}}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:'auto'}}>
        <defs><linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#09A09D" stopOpacity=".25"/><stop offset="100%" stopColor="#09A09D" stopOpacity=".02"/></linearGradient></defs>
        {[0,.25,.5,.75,1].map(f => <line key={f} x1={px} y1={py+chartH*f} x2={w-px} y2={py+chartH*f} stroke="rgba(255,255,255,.05)" strokeWidth="1"/>)}
        <path d={area} fill="url(#areaFill)"/>
        <path d={line} fill="none" stroke="#0EC4C1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {coords.map((c,i) => <circle key={i} cx={c.x} cy={c.y} r="3" fill="#0EC4C1" stroke="#0A0E13" strokeWidth="1.5"/>)}
        {labels && labels.map((l,i) => <text key={i} x={coords[i].x} y={h-1} textAnchor="middle" style={{fontSize:'9px',fill:'#6E8D9A',fontFamily:'Geist Mono,monospace'}}>{l}</text>)}
      </svg>
    </div>
  );
}


/* ── HERO CANVAS ── */
function HeroCanvas() {
  const cvRef = useRef(null);
  useEffect(() => {
    const cv = cvRef.current;
    const ctx = cv.getContext('2d');
    let raf, startTime = null;
    const T=[9,160,157], T2=[14,196,193], T3=[200,255,254];
    function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const CX=()=>cv.width/2, CY=()=>cv.height*0.46;
    const easeOut3=t=>1-Math.pow(1-t,3), easeOut5=t=>1-Math.pow(1-t,5);
    const easeIn3=t=>t*t*t;
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

    function bezier(sx,sy,cpx,cpy,ex,ey,t){
      const mt=1-t;
      return{x:mt*mt*sx+2*mt*t*cpx+t*t*ex,y:mt*mt*sy+2*mt*t*cpy+t*t*ey};
    }

    const question = 'Why is my CSAT low after the last update?';
    const answer = 'CSAT dropped to 3.2 \u2014 down 18% since v4.1 release';
    const fragments = [
      {text:'CSAT: 3.2',nx:-0.32,ny:-0.22},{text:'\u2193 18%',nx:0.30,ny:-0.18},
      {text:'47 tickets',nx:-0.12,ny:0.26},{text:'v4.1',nx:0.14,ny:0.20},
      {text:'Avg reply: 6h',nx:-0.34,ny:0.04},{text:'NPS: 32',nx:0.36,ny:0.08},
      {text:'142 reviews',nx:0.20,ny:-0.28},{text:'3.8\u2192 3.2',nx:-0.24,ny:-0.12},
    ].map((m,i)=>({...m,phase:Math.random()*Math.PI*2,dx:(Math.random()-.5)*0.012,dy:(Math.random()-.5)*0.01}));

    const SOURCES=[
      {name:'Zendesk',nx:-0.28,ny:-0.20},{name:'Freshdesk',nx:0.26,ny:-0.22},
      {name:'PostgreSQL',nx:-0.06,ny:-0.28},{name:'GA4',nx:0.30,ny:0.10},
      {name:'Mixpanel',nx:-0.30,ny:0.12},
    ];
    const N=SOURCES.length;

    function drawQuestion(t){
      if(t>3.2)return;
      const fadeOut=t>2.5?clamp((t-2.5)/0.5,0,1):0;
      const a=(1-fadeOut);
      if(a<0.01)return;
      const chars=Math.floor(clamp(t/0.04,0,question.length));
      const qText=question.substring(0,chars);
      const ansA=clamp((t-1.2)/0.4,0,1);
      ctx.save(); ctx.globalAlpha=a;
      ctx.font=`500 ${Math.min(22,cv.width*.022)}px 'Geist Mono',monospace`;
      ctx.fillStyle=`rgba(${T3[0]},${T3[1]},${T3[2]},0.9)`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(qText,CX(),CY()-20);
      if(chars>=question.length && t<2.5){
        ctx.fillStyle=`rgba(${T3[0]},${T3[1]},${T3[2]},${0.6*Math.abs(Math.sin(t*4))})`;
        const tw=ctx.measureText(qText).width;
        ctx.fillRect(CX()+tw/2+2,CY()-32,2,24);
      }
      if(ansA>0){
        ctx.globalAlpha=a*ansA;
        ctx.font=`400 ${Math.min(15,cv.width*.016)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},0.7)`;
        ctx.fillText(answer,CX(),CY()+16);
      }
      ctx.restore();
    }

    function drawFragments(t){
      if(t>3.2)return;
      const pull=t>2.5?clamp((t-2.5)/0.5,0,1):0;
      const pullE=easeIn3(pull);
      const dim=Math.min(cv.width,cv.height);
      fragments.forEach((f,i)=>{
        const appear=clamp((t-0.3-i*0.08)/0.4,0,1);
        if(appear<0.01)return;
        let x=CX()+f.nx*dim+Math.sin(t*0.8+f.phase)*12;
        let y=CY()+f.ny*dim+Math.cos(t*0.6+f.phase)*8;
        x=x+(CX()-x)*pullE;
        y=y+(CY()-y)*pullE;
        const a=appear*(1-pullE*0.8);
        ctx.save(); ctx.globalAlpha=a*0.35;
        ctx.font=`500 ${Math.min(13,cv.width*.013)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},1)`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(f.text,x,y);
        ctx.restore();
      });
    }

    function drawTrigger(t){
      if(t<1.6||t>3.4)return;
      const appear=clamp((t-1.6)/0.3,0,1);
      const fadeOut=t>2.6?clamp((t-2.6)/0.5,0,1):0;
      const a=appear*(1-fadeOut);
      if(a<0.01)return;
      const glow=0.5+Math.sin(t*5)*0.3;
      ctx.save(); ctx.globalAlpha=a;
      const bw=180,bh=36,bx=CX()-bw/2,by=CY()+46;
      ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},${0.12*glow})`;
      ctx.strokeStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${0.4*glow})`;
      ctx.lineWidth=1;
      ctx.beginPath();
      const r=10;
      ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.font=`500 ${Math.min(13,cv.width*.014)}px 'Geist Mono',monospace`;
      ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},0.9)`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('\u26A1 Generate Insight',CX(),by+bh/2);
      ctx.restore();
    }

    function drawShockwave(t){
      if(t<2.2||t>3.4)return;
      const p=clamp((t-2.2)/0.9,0,1);
      const maxR=Math.min(cv.width,cv.height)*0.4;
      const r=p*maxR;
      const a=(1-p)*0.3;
      if(a<0.005)return;
      ctx.save();
      ctx.beginPath();ctx.arc(CX(),CY(),r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${a})`;
      ctx.lineWidth=2*(1-p);
      ctx.stroke();
      ctx.restore();
    }

    function drawFlash(t){
      const peak=Math.max(0,1-Math.abs(t-2.4)/0.4)*0.3;
      if(peak<0.005)return;
      const g=ctx.createRadialGradient(CX(),CY(),0,CX(),CY(),60+peak*100);
      g.addColorStop(0,`rgba(${T2[0]},${T2[1]},${T2[2]},${peak})`);
      g.addColorStop(0.4,`rgba(${T[0]},${T[1]},${T[2]},${peak*0.3})`);
      g.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);
    }

    /* ── NETWORK (static structure) ── */
    const SCAN_START=3.4, SCAN_INT=0.3;
    const scanTexts=['Pulling support tickets...','Scanning helpdesk threads...','Cross-referencing release logs...','Analyzing user sessions...','Correlating behavior patterns...'];
    const resultLines=['Root cause: v4.1 checkout flow change broke mobile UX','Affected: 68% of negative tickets mention "checkout"','Recommendation: Revert checkout.js to v4.0.3, notify affected users'];

    function sourceGeom(i,cx,cy,ringR,orbR){
      const angle=(i/N)*Math.PI*2-Math.PI/2;
      const sx=cx+Math.cos(angle)*ringR, sy=cy+Math.sin(angle)*ringR;
      const perp=i%2===0?1:-1;
      const mag=ringR*(0.3+0.12*(i%3));
      const midX=(sx+cx)/2, midY=(sy+cy)/2;
      const dx=cx-sx, dy=cy-sy, len=Math.sqrt(dx*dx+dy*dy)||1;
      const cpx=midX+(-dy/len)*mag*perp, cpy=midY+(dx/len)*mag*perp;
      const dist=Math.sqrt((cx-sx)**2+(cy-sy)**2)||1;
      const stopFrac=Math.max(0,1-(orbR*1.1)/dist);
      return{sx,sy,cpx,cpy,angle,stopFrac};
    }

    function drawNetwork(t){
      if(t<2.9)return;
      const fi=clamp((t-2.9)/0.7,0,1);
      const fadeOut=t>5.5?clamp((t-5.5)/0.8,0,1):0;
      const a=easeOut5(fi)*(1-fadeOut);
      if(a<0.01)return;
      const cx=CX(),cy=CY();
      const ringR=Math.min(cv.width,cv.height)*0.26;
      const orbR=Math.min(cv.width,cv.height)*0.04;

      /* center ambient glow */
      const ag=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR*3.5);
      ag.addColorStop(0,`rgba(${T[0]},${T[1]},${T[2]},${a*0.08})`);
      ag.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.fillStyle=ag;ctx.fillRect(0,0,cv.width,cv.height);

      /* center orb — pulses when a source particle arrives */
      let orbBoost=0;
      SOURCES.forEach((_,i)=>{
        const lt=t-SCAN_START-i*SCAN_INT;
        if(lt>0.35&&lt<0.55) orbBoost=Math.max(orbBoost,1-Math.abs(lt-0.45)/0.1);
      });
      /* convergence pulse boost */
      const convT=t-4.9;
      if(convT>0&&convT<0.5) orbBoost=Math.max(orbBoost,clamp(convT/0.2,0,1)*(1-clamp((convT-0.3)/0.2,0,1)));
      const orbScale=1+orbBoost*0.5;
      const orbAlpha=a*(0.15+orbBoost*0.6);

      const mg=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR*1.8*orbScale);
      mg.addColorStop(0,`rgba(${T2[0]},${T2[1]},${T2[2]},${orbAlpha*0.6})`);
      mg.addColorStop(0.6,`rgba(${T[0]},${T[1]},${T[2]},${orbAlpha*0.2})`);
      mg.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.beginPath();ctx.arc(cx,cy,orbR*1.8*orbScale,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();

      const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,orbR*orbScale);
      ig.addColorStop(0,`rgba(255,255,255,${orbAlpha*0.7})`);
      ig.addColorStop(0.35,`rgba(${T3[0]},${T3[1]},${T3[2]},${orbAlpha*0.5})`);
      ig.addColorStop(0.7,`rgba(${T2[0]},${T2[1]},${T2[2]},${orbAlpha*0.2})`);
      ig.addColorStop(1,`rgba(${T[0]},${T[1]},${T[2]},0)`);
      ctx.beginPath();ctx.arc(cx,cy,orbR*orbScale,0,Math.PI*2);ctx.fillStyle=ig;ctx.fill();

      /* ring */
      ctx.beginPath();ctx.arc(cx,cy,ringR,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${T[0]},${T[1]},${T[2]},${a*0.08})`;ctx.lineWidth=0.7;ctx.stroke();

      /* nodes + curves */
      SOURCES.forEach((s,i)=>{
        const delay=i/N*0.5;
        const na=clamp((fi-delay)/0.4,0,1);
        if(na<0.01)return;
        const nodeA=a*easeOut3(na);
        const g=sourceGeom(i,cx,cy,ringR,orbR);
        const ep=bezier(g.sx,g.sy,g.cpx,g.cpy,cx,cy,g.stopFrac);

        /* per-source brightness: idle → scanning → done */
        const lt=t-SCAN_START-i*SCAN_INT;
        const scanning=lt>=0&&lt<SCAN_INT;
        const done=lt>=SCAN_INT;
        const curveBright=done?0.18:(scanning?0.35:0.06);
        const nodeBright=done?0.95:(scanning?1.0:0.6);
        const nodeSize=scanning?4.5:3.5;

        /* curve */
        ctx.beginPath();ctx.moveTo(g.sx,g.sy);ctx.quadraticCurveTo(g.cpx,g.cpy,ep.x,ep.y);
        ctx.strokeStyle=`rgba(${T[0]},${T[1]},${T[2]},${nodeA*curveBright})`;ctx.lineWidth=1;ctx.stroke();

        /* node dot */
        const dotColor=done?'34,197,94':`${T2[0]},${T2[1]},${T2[2]}`;
        ctx.beginPath();ctx.arc(g.sx,g.sy,nodeSize,0,Math.PI*2);
        ctx.fillStyle=`rgba(${dotColor},${nodeA*nodeBright})`;
        ctx.shadowColor=`rgba(${dotColor},.6)`;ctx.shadowBlur=scanning?12:6;
        ctx.fill();ctx.shadowBlur=0;

        /* label */
        const labelR=ringR+32;
        const lx=cx+Math.cos(g.angle)*labelR,ly=cy+Math.sin(g.angle)*labelR;
        ctx.save();ctx.globalAlpha=nodeA*(scanning?0.95:done?0.7:0.5);
        ctx.font=`500 ${Math.min(12,cv.width*.012)}px 'Geist Mono',monospace`;
        ctx.fillStyle=scanning?`rgba(${T2[0]},${T2[1]},${T2[2]},1)`:`rgba(${T[0]},${T[1]},${T[2]},1)`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(s.name,lx,ly);
        ctx.restore();
      });
    }

    /* ── SEQUENTIAL SCAN (particles + text) ── */
    function drawSequentialScan(t){
      if(t<SCAN_START)return;
      const cx=CX(),cy=CY();
      const ringR=Math.min(cv.width,cv.height)*0.26;
      const orbR=Math.min(cv.width,cv.height)*0.04;
      const fadeOut=t>5.5?clamp((t-5.5)/0.8,0,1):0;
      const baseA=1-fadeOut;
      if(baseA<0.01)return;

      SOURCES.forEach((s,i)=>{
        const lt=t-SCAN_START-i*SCAN_INT;
        if(lt<0||lt>SCAN_INT)return;
        const g=sourceGeom(i,cx,cy,ringR,orbR);

        /* Pull particle: source → center (0.1–0.45) */
        const pullP=clamp((lt-0.1)/0.35,0,1);
        if(pullP>0&&pullP<1){
          const pt=bezier(g.sx,g.sy,g.cpx,g.cpy,cx,cy,pullP*g.stopFrac);
          const pA=Math.sin(pullP*Math.PI)*baseA;
          ctx.beginPath();ctx.arc(pt.x,pt.y,3,0,Math.PI*2);
          ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${pA})`;
          ctx.shadowColor=`rgba(${T2[0]},${T2[1]},${T2[2]},.9)`;ctx.shadowBlur=14;
          ctx.fill();ctx.shadowBlur=0;
          /* trail */
          const trailLen=0.12;
          for(let tr=1;tr<=4;tr++){
            const tp=Math.max(0,pullP-tr*trailLen*0.25);
            const tpt=bezier(g.sx,g.sy,g.cpx,g.cpy,cx,cy,tp*g.stopFrac);
            ctx.beginPath();ctx.arc(tpt.x,tpt.y,2-tr*0.3,0,Math.PI*2);
            ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${pA*0.3*(1-tr/5)})`;
            ctx.fill();
          }
        }

        /* Return particle: center → source (0.45–0.7) */
        const retP=clamp((lt-0.45)/0.25,0,1);
        if(retP>0&&retP<1){
          const rFrac=(1-retP)*g.stopFrac;
          const pt=bezier(g.sx,g.sy,g.cpx,g.cpy,cx,cy,rFrac);
          const rA=Math.sin(retP*Math.PI)*baseA;
          ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(${T3[0]},${T3[1]},${T3[2]},${rA})`;
          ctx.shadowColor=`rgba(${T3[0]},${T3[1]},${T3[2]},.8)`;ctx.shadowBlur=12;
          ctx.fill();ctx.shadowBlur=0;
        }
      });

      /* Analysis text — one per active source */
      const textY=cy+cv.height*0.22;
      ctx.save();
      SOURCES.forEach((s,i)=>{
        const lt=t-SCAN_START-i*SCAN_INT;
        if(lt<0)return;
        const textA=clamp(lt/0.2,0,1)*(1-clamp((lt-SCAN_INT+0.15)/0.15,0,1))*baseA;
        if(textA<0.01)return;
        const chars=Math.floor(clamp(lt/0.035,0,scanTexts[i].length));
        ctx.globalAlpha=textA;
        ctx.font=`400 ${Math.min(12,cv.width*.012)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T[0]},${T[1]},${T[2]},0.6)`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(scanTexts[i].substring(0,chars),cx,textY);
      });
      ctx.restore();
    }

    /* ── CONVERGENCE PULSE ── */
    function drawConvergence(t){
      if(t<4.9||t>6.5)return;
      const ct=t-4.9;
      const cx=CX(),cy=CY();
      const ringR=Math.min(cv.width,cv.height)*0.26;
      const orbR=Math.min(cv.width,cv.height)*0.04;
      const fadeOut=ct>0.5?clamp((ct-0.5)/0.5,0,1):0;
      const a=(1-fadeOut);

      /* all sources send simultaneous final pulse */
      const pulseP=clamp(ct/0.35,0,1);
      if(pulseP<1){
        SOURCES.forEach((s,i)=>{
          const g=sourceGeom(i,cx,cy,ringR,orbR);
          const pt=bezier(g.sx,g.sy,g.cpx,g.cpy,cx,cy,pulseP*g.stopFrac);
          const pA=Math.sin(pulseP*Math.PI)*a;
          ctx.beginPath();ctx.arc(pt.x,pt.y,3.5,0,Math.PI*2);
          ctx.fillStyle=`rgba(${T3[0]},${T3[1]},${T3[2]},${pA})`;
          ctx.shadowColor=`rgba(${T2[0]},${T2[1]},${T2[2]},.9)`;ctx.shadowBlur=16;
          ctx.fill();ctx.shadowBlur=0;

          /* brighten all curves */
          const ep=bezier(g.sx,g.sy,g.cpx,g.cpy,cx,cy,g.stopFrac);
          ctx.beginPath();ctx.moveTo(g.sx,g.sy);ctx.quadraticCurveTo(g.cpx,g.cpy,ep.x,ep.y);
          ctx.strokeStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},${pA*0.4})`;ctx.lineWidth=1.5;ctx.stroke();
        });
      }

      /* "Root cause identified" text */
      const textA=clamp((ct-0.2)/0.3,0,1)*a;
      if(textA>0.01){
        const fullText='Root cause identified \u2713';
        const chars=Math.floor(clamp((ct-0.2)/0.04,0,fullText.length));
        ctx.save();ctx.globalAlpha=textA;
        ctx.font=`500 ${Math.min(13,cv.width*.013)}px 'Geist Mono',monospace`;
        ctx.fillStyle=`rgba(${T2[0]},${T2[1]},${T2[2]},0.9)`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(fullText.substring(0,chars),cx,cy+cv.height*0.22);
        ctx.restore();
      }
    }

    /* ── RESULTS REVEAL ── */
    function drawResults(t){
      if(t<5.5||t>8.5)return;
      const rt=t-5.5;
      const cx=CX(),cy=CY();
      const fadeOut=rt>2.5?clamp((rt-2.5)/0.6,0,1):0;
      const a=(1-fadeOut);
      if(a<0.01)return;

      ctx.save();
      resultLines.forEach((line,i)=>{
        const lt=rt-i*0.4;
        if(lt<0)return;
        const lineA=clamp(lt/0.25,0,1)*a;
        const chars=Math.floor(clamp(lt/0.008,0,line.length));
        const yOff=cy+30+i*26;
        ctx.globalAlpha=lineA;
        ctx.font=`400 ${Math.min(13,cv.width*.013)}px 'Geist Mono',monospace`;
        ctx.fillStyle=i===0?`rgba(${T2[0]},${T2[1]},${T2[2]},0.9)`
          :i===2?`rgba(34,197,94,0.8)`
          :`rgba(${T[0]},${T[1]},${T[2]},0.6)`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(line.substring(0,chars),cx,yOff);
      });
      ctx.restore();
    }

    function loop(ts){
      if(!startTime)startTime=ts;
      const t=(ts-startTime)/1000;
      ctx.clearRect(0,0,cv.width,cv.height);
      drawFlash(t);
      drawFragments(t);
      drawQuestion(t);
      drawTrigger(t);
      drawShockwave(t);
      drawNetwork(t);
      drawSequentialScan(t);
      drawConvergence(t);
      drawResults(t);
      if(t < 8.5) raf=requestAnimationFrame(loop);
      else ctx.clearRect(0,0,cv.width,cv.height);
    }
    raf=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={cvRef} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>;
}
